# ETTh1 Multi-Scale Decomposition Experiments
# Testing multi-scale trend and seasonal components

experiment_name: "etth1_multiscale"
output_dir: "outputs/decomp_linear_bench/etth1_multiscale"

dataset:
  name: "ETTh1"
  path: "dataset/ETTh1.csv"
  split: "standard"  # 70/10/20

# Multi-scale decomposition methods
decomp_methods:
  # Single-scale baseline (for comparison)
  - method: "STL"
    params:
      period: 24
    label: "STL-24"
  
  - method: "STL"
    params:
      period: 168
    label: "STL-168"
  
  # Multi-scale STL (MSTL)
  - method: "MSTL"
    params:
      periods: [24, 168]  # Daily + Weekly
    label: "MSTL-24-168"
  
  # SSA with different window sizes
  - method: "SSA"
    params:
      window: 112  # lookback / 3
      n_components: 10
      trend_indices: [0, 1, 2]
      seasonal_indices: [3, 4, 5, 6]
    label: "SSA-w112"
  
  - method: "SSA"
    params:
      window: 168  # lookback / 2
      n_components: 10
      trend_indices: [0, 1, 2]
      seasonal_indices: [3, 4, 5, 6]
    label: "SSA-w168"
  
  # STD_MULTI with multiple block sizes
  - method: "STD_MULTI"
    params:
      block_size: 24
    label: "STD-24"
  
  - method: "STD_MULTI"
    params:
      block_size: 168
    label: "STD-168"

horizons: [96, 192, 336, 720]
lookback: 336

# Ablation study: test different component combinations
ablation_components:
  - "RAW"      # Baseline
  - "+T"       # Raw + Trend
  - "+S"       # Raw + Seasonal
  - "+TS"      # Raw + Trend + Seasonal (multi-scale)
  - "T"        # Trend only
  - "S"        # Seasonal only

learner:
  type: "Ridge"
  alpha: 1.0

random_seed: 42
