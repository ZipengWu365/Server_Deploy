# ETTh1 Multi-Scale Decomposition Experiments
# Testing multi-scale trend and seasonal components

experiment_name: "etth1_multiscale"
output_dir: "outputs/decomp_linear_bench/etth1_multiscale"

dataset:
  name: "ETTh1"
  path: "dataset/ETTh1.csv"
  split: "standard"  # 70/10/20

# Multi-scale decomposition methods
decomp_methods:
  # STL multi-scale from full train
  - method: "STL"
    multi_scales:
      - {period: 24}
      - {period: 168}
    label: "STL-MS"

  # SSA multi-scale from full train
  - method: "SSA"
    multi_scales:
      - {window: 112, n_components: 10, trend_indices: [0,1,2], seasonal_indices: [3,4,5,6]}
      - {window: 168, n_components: 10, trend_indices: [0,1,2], seasonal_indices: [3,4,5,6]}
    label: "SSA-MS"

  # STD_MULTI multi-scale
  - method: "STD_MULTI"
    multi_scales:
      - {block_size: 24, seasonal_rank: 6}
      - {block_size: 168, seasonal_rank: 5}
    label: "STD-MS"

horizons: [96, 192, 336, 720]
lookback: 336
decomp_mode: "global"

# Ablation study: test different component combinations
ablation_modes:
  - "RAW"      # Baseline
  - "+T"       # Raw + single-scale Trend (first scale)
  - "+S"       # Raw + single-scale Seasonal (first scale)
  - "+TS"      # Raw + single-scale T+S (first scale)
  - "MS_T"     # Raw + multi-scale Trend
  - "MS_S"     # Raw + multi-scale Seasonal
  - "MS_TS"    # Raw + multi-scale T+S

learner:
  type: "Ridge"
  alpha: 1.0

random_seed: 42
